<title>Page Not Found | Coons Roofing</title>
<script>
  // Redirect URLs from the previous site (still in Google's index, now removed)
  // to the homepage so visitors and link equity land somewhere useful.
  (function () {
    var p = location.pathname.toLowerCase();
    if (
      /^\/(services|service-areas|financing|kemah-tx|gallery|about-us|contact-us)(\/|$)/.test(p) ||
      /-tx\//.test(p)
    ) {
      location.replace('/');
    }
  })();
</script>
